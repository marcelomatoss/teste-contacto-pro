services:
  redis:
    image: redis:7-alpine
    container_name: contactpro-redis
    restart: unless-stopped
    # noeviction is the policy recommended by BullMQ; jobs lost to eviction
    # would silently break retries / idempotency.
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: contactpro-bot-backend:latest
    container_name: contactpro-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: file:/app/data/sqlite.db
      WHATSAPP_SESSION_PATH: /app/data/wa-session
      MEDIA_PATH: /app/data/media
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      REDIS_URL: redis://redis:6379
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      AI_MODEL: ${AI_MODEL:-claude-sonnet-4-5-20250929}
      AI_API_KEY: ${AI_API_KEY:-}
      STT_PROVIDER: ${STT_PROVIDER:-openai}
      STT_MODEL: ${STT_MODEL:-whisper-1}
      STT_API_KEY: ${STT_API_KEY:-}
      TTS_PROVIDER: ${TTS_PROVIDER:-openai}
      TTS_MODEL: ${TTS_MODEL:-gpt-4o-mini-tts}
      TTS_VOICE: ${TTS_VOICE:-alloy}
      TTS_API_KEY: ${TTS_API_KEY:-}
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: contactpro-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=14d"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.3.1
    container_name: contactpro-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3030:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./data/grafana:/var/lib/grafana
    depends_on:
      - prometheus

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Vite envs are baked in at build time — pass them through here so the
      # static bundle calls the right backend.
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:3001}
    image: contactpro-bot-frontend:latest
    container_name: contactpro-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
